        theory: `Theory:
Breadth First Search (BFS) traverses graph level by level. OpenMP is used here to process nodes in parallel for faster execution. Queue data structure stores nodes to visit and visited array prevents revisiting nodes.`,
        code: `// =========================================================
// PRACTICAL : Parallel Breadth First Search (BFS)
// TECHNOLOGY: OpenMP
// =========================================================
// THEORY:
// Breadth First Search traverses a graph level by level.
// It first visits the source node, then all adjacent nodes,
// then neighbors of adjacent nodes and so on.
//
// WHY PARALLEL BFS?
// In large graphs traversal becomes expensive.
// OpenMP allows multiple nodes to be processed together.
// This improves performance and reduces execution time.
//
// IMPORTANT CONCEPTS:
// 1. Queue  -> Stores nodes for traversal.
// 2. Visited Array -> Prevents revisiting nodes.
// 3. OpenMP Parallel For -> Executes iterations in parallel.
// 4. Critical Section -> Prevents race conditions.
//
// APPLICATIONS:
// - Social Network Analysis
// - Web Crawlers
// - GPS Navigation
// - Network Broadcasting
// =========================================================

#include <iostream>
#include <queue>
#include <vector>
#include <omp.h>

using namespace std;

void parallelBFS(vector<vector<int>> &adj, int start, int n)
{
    vector<bool> visited(n, false);
    queue<int> q;

    q.push(start);
    visited[start] = true;

    cout << "BFS Traversal: ";

    while (!q.empty())
    {
        int size = q.size();
        vector<int> current_level;

#pragma omp parallel for
        for (int i = 0; i < size; i++)
        {
            int u = q.front();
            q.pop();

#pragma omp critical
            current_level.push_back(u);

            for (int v : adj[u])
            {
#pragma omp critical
                {
                    if (!visited[v])
                    {
                        visited[v] = true;
                        q.push(v);
                    }
                }
            }
        }

        for (int node : current_level)
        {
            cout << node << " ";
        }
    }
    cout << endl;
}

int main()
{
    int n = 6;
    vector<vector<int>> adj(n);

    adj[0] = {1, 2};
    adj[1] = {0, 3, 4};
    adj[2] = {0, 5};
    adj[3] = {1};
    adj[4] = {1};
    adj[5] = {2};

    cout << "Parallel BFS from node 0:" << endl;
    parallelBFS(adj, 0, n);

    return 0;
}`

// PRACTICAL : Parallel Depth First Search (DFS)
// TECHNOLOGY: OpenMP
// =========================================================
// THEORY:
// Depth First Search explores graph nodes deeply before
// backtracking. It follows one path completely and then
// moves to another unexplored path.
//
// WHY PARALLEL DFS?
// Parallelism helps in exploring multiple graph branches

//
// IMPORTANT CONCEPTS:

// - Cycle Detection
// - Path Finding
// - AI Search Problems

#include <stack>
#include <vector>
#include <omp.h>

                if (!visited[v])
                {

                    s.push(v);

            }
        }
    }

        code: `// =========================================================
// PRACTICAL : Parallel Bubble Sort
// TECHNOLOGY: OpenMP
// =========================================================
// THEORY:
// Bubble Sort repeatedly compares adjacent elements and
// swaps them if they are in incorrect order.
//
// In Parallel Bubble Sort, Odd-Even Transposition method
// is used where multiple comparisons happen together.
// This improves execution speed using CPU parallelism.
//
// IMPORTANT CONCEPTS:
// 1. Sequential Bubble Sort -> Normal sorting approach.
// 2. Parallel Bubble Sort -> Uses OpenMP threads.
// 3. Odd Phase -> Compare odd indexed elements.
// 4. Even Phase -> Compare even indexed elements.
//
// APPLICATIONS:
// - Parallel Computing Learning
// - Performance Comparison
// - Sorting Large Datasets
// =========================================================

#include <iostream>
#include <vector>
#include <cstdlib>
#include <chrono>
#include <omp.h>

using namespace std;

void sequentialBubbleSort(vector<int> arr)
{
    int n = arr.size();
    auto start = chrono::high_resolution_clock::now();

    for (int i = 0; i < n - 1; i++)
    {
        for (int j = 0; j < n - i - 1; j++)
        {
            if (arr[j] > arr[j + 1])
            {
                swap(arr[j], arr[j + 1]);
            }
        }
    }

    auto end = chrono::high_resolution_clock::now();
    auto duration = chrono::duration_cast<chrono::milliseconds>(end - start);
    cout << "Sequential Bubble Sort Time: " << duration.count() << " ms" << endl;
}

void parallelBubbleSort(vector<int> arr)
{
    int n = arr.size();
    auto start = chrono::high_resolution_clock::now();

    for (int i = 0; i < n; i++)
    {
        if (i % 2 == 0)
        {
#pragma omp parallel for
            for (int j = 0; j < n - 1; j += 2)
            {
                if (arr[j] > arr[j + 1])
                {
                    swap(arr[j], arr[j + 1]);
                }
            }
        }
        else
        {
#pragma omp parallel for
            for (int j = 1; j < n - 1; j += 2)
            {
                if (arr[j] > arr[j + 1])
                {
                    swap(arr[j], arr[j + 1]);
                }
            }
        }
    }

    auto end = chrono::high_resolution_clock::now();
    auto duration = chrono::duration_cast<chrono::milliseconds>(end - start);
    cout << "Parallel Bubble Sort Time: " << duration.count() << " ms" << endl;
}

int main()
{
    int n = 10000;
    vector<int> arr1(n), arr2(n);

    for (int i = 0; i < n; i++)
    {
        arr1[i] = arr2[i] = rand() % 1000;
    }

    cout << "Array size: " << n << endl;
    cout << "\n--- Bubble Sort Performance ---" << endl;
    sequentialBubbleSort(arr1);
    parallelBubbleSort(arr2);

    return 0;
}`

        code: `// Parallel Merge Sort using OpenMP
// Divide and Conquer sorting algorithm.
// Recursive calls execute in parallel.

#include <iostream>
#include <vector>
#include <cstdlib>
#include <chrono>
#include <omp.h>

using namespace std;

void merge(vector<int> &arr, int left, int mid, int right)
{
    vector<int> temp(right - left + 1);
    int i = left, j = mid + 1, k = 0;

    while (i <= mid && j <= right)
    {
        if (arr[i] <= arr[j])
        {
            temp[k++] = arr[i++];
        }
        else
        {
            temp[k++] = arr[j++];
        }
    }

    while (i <= mid)
        temp[k++] = arr[i++];
    while (j <= right)
        temp[k++] = arr[j++];

    for (int i = left, k = 0; i <= right; i++, k++)
    {
        arr[i] = temp[k];
    }
}

void sequentialMergeSort(vector<int> &arr, int left, int right)
{
    if (left < right)
    {
        int mid = left + (right - left) / 2;
        sequentialMergeSort(arr, left, mid);
        sequentialMergeSort(arr, mid + 1, right);
        merge(arr, left, mid, right);
    }
}

void parallelMergeSort(vector<int> &arr, int left, int right, int depth)
{
    if (left < right)
    {
        int mid = left + (right - left) / 2;

        if (depth < 4)
        {
#pragma omp parallel sections
            {
#pragma omp section
                parallelMergeSort(arr, left, mid, depth + 1);

#pragma omp section
                parallelMergeSort(arr, mid + 1, right, depth + 1);
            }
        }
        else
        {
            parallelMergeSort(arr, left, mid, depth + 1);
            parallelMergeSort(arr, mid + 1, right, depth + 1);
        }

        merge(arr, left, mid, right);
    }
}

int main()
{
    int n = 100000;
    vector<int> arr1(n), arr2(n);

    for (int i = 0; i < n; i++)
    {
        arr1[i] = arr2[i] = rand() % 10000;
    }

    cout << "Array size: " << n << endl;
    cout << "\n--- Merge Sort Performance ---" << endl;

    auto start = chrono::high_resolution_clock::now();
    sequentialMergeSort(arr1, 0, n - 1);
    auto end = chrono::high_resolution_clock::now();
    auto dur1 = chrono::duration_cast<chrono::milliseconds>(end - start);
    cout << "Sequential Merge Sort Time: " << dur1.count() << " ms" << endl;

    start = chrono::high_resolution_clock::now();
    parallelMergeSort(arr2, 0, n - 1, 0);
    end = chrono::high_resolution_clock::now();
    auto dur2 = chrono::duration_cast<chrono::milliseconds>(end - start);

}`

// Demonstrates min, max, sum and average.
// Reduction clause combines thread results safely.

#include <iostream>
#include <vector>
#include <cstdlib>
#include <climits>
#include <omp.h>

using namespace std;

int main()
{
    int n = 1000000;
    vector<int> arr(n);

    for (int i = 0; i < n; i++)
    {
        arr[i] = rand() % 1000;
    }

    cout << "Array size: " << n << endl;
    cout << "\n--- Parallel Reduction Operations ---" << endl;

    int min_val = INT_MAX;
#pragma omp parallel for reduction(min : min_val)
    for (int i = 0; i < n; i++)
    {
        min_val = min(min_val, arr[i]);
    }
    cout << "Min: " << min_val << endl;

    int max_val = INT_MIN;
#pragma omp parallel for reduction(max : max_val)
    for (int i = 0; i < n; i++)
    {
        max_val = max(max_val, arr[i]);
    }
    cout << "Max: " << max_val << endl;

    long long sum = 0;
#pragma omp parallel for reduction(+ : sum)
    for (int i = 0; i < n; i++)
    {
        sum += arr[i];
    }
    cout << "Sum: " << sum << endl;

    double average = (double)sum / n;
    cout << "Average: " << average << endl;

    int count = 0;
#pragma omp parallel for reduction(+ : count)
    for (int i = 0; i < n; i++)
    {
        if (arr[i] > average)
        {
            count++;
        }
    }
    cout << "Elements above average: " << count << endl;

    return 0;
}`

CUDA allows GPU based parallel execution. Each GPU thread computes addition for one vector element. This improves computational speed for large vectors.`,
        code: `// =========================================================
// PRACTICAL : CUDA Vector Addition
// TECHNOLOGY: CUDA Programming
// =========================================================
// THEORY:
// CUDA is NVIDIA's parallel computing platform.
// GPU executes thousands of threads simultaneously.
//
// In this practical each GPU thread performs addition
// of one vector element.
//
// IMPORTANT CONCEPTS:
// 1. Host Memory -> CPU memory.

#include <stdio.h>
#include <cuda_runtime.h>

__global__ void vectorAdd(int *a, int *b, int *c, int n)
{
    int i = threadIdx.x;
    if(i < n)
    {
        c[i] = a[i] + b[i];
    }
}

int main()
{
    int n = 5;
    int a[] = {1,2,3,4,5};
    int b[] = {10,20,30,40,50};
    int c[5];

    int *d_a, *d_b, *d_c;

    cudaMalloc((void**)&d_a, n*sizeof(int));
    cudaMalloc((void**)&d_b, n*sizeof(int));
    cudaMalloc((void**)&d_c, n*sizeof(int));

    cudaMemcpy(d_a, a, n*sizeof(int), cudaMemcpyHostToDevice);
    cudaMemcpy(d_b, b, n*sizeof(int), cudaMemcpyHostToDevice);

    vectorAdd<<<1,n>>>(d_a,d_b,d_c,n);

    cudaMemcpy(c,d_c,n*sizeof(int),cudaMemcpyDeviceToHost);

    for(int i=0;i<n;i++)
        printf("%d ", c[i]);

    cudaFree(d_a);
    cudaFree(d_b);
    cudaFree(d_c);

    return 0;
}`

#include <stdio.h>

__global__ void matrixMul(int A[][2], int B[][2], int C[][2])
{
    int row = threadIdx.y;
    int col = threadIdx.x;

    C[row][col] = 0;

    for(int k=0;k<2;k++)
    {
        C[row][col] += A[row][k] * B[k][col];
    }
}

int main()

    dim3 threads(2,2);
